<!DOCTYPE html>
<html lang="sk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bazénový manažér</title>
    <style>
        :root { --bg: #f4f7f6; --card: #ffffff; --primary: #0056b3; --text: #2c3e50; }
        body { font-family: system-ui, -apple-system, sans-serif; background: var(--bg); color: var(--text); padding: 15px; margin: 0; display: flex; justify-content: center; }
        .container { max-width: 480px; width: 100%; background: var(--card); padding: 20px; border-radius: 16px; box-shadow: 0 8px 24px rgba(0,0,0,0.08); }
        h1 { font-size: 1.3rem; text-align: center; color: var(--primary); margin-top: 0; border-bottom: 2px solid #eef2f5; padding-bottom: 10px; }
        .group { margin-bottom: 12px; background: #f8fafc; padding: 10px; border-radius: 8px; border: 1px solid #edf2f7; }
        label { display: flex; justify-content: space-between; font-weight: bold; margin-bottom: 5px; font-size: 0.85rem; text-transform: uppercase; letter-spacing: 0.5px; }
        .val-display { color: var(--primary); font-weight: bold; }
        select, input[type="number"], input[type="range"], input[type="date"] { width: 100%; padding: 8px; border: 1px solid #cbd5e1; border-radius: 6px; box-sizing: border-box; font-size: 1rem; font-family: inherit; }
        .result-box { background: #f0fdf4; border-left: 5px solid #22c55e; padding: 12px; border-radius: 8px; margin-top: 12px; font-size: 0.95rem; }
        .warning { background: #fef2f2; border-left: 5px solid #ef4444; color: #991b1b; }
        .chem-action { background: #fffbeb; border-left: 5px solid #f59e0b; color: #78350f; }
        .float-box { background: #f0f9ff; border-left: 5px solid #0284c7; color: #0c4a6e; }
        .info-title { font-weight: bold; margin-bottom: 4px; font-size: 0.85rem; color: #1e293b; }
    </style>
</head>
<body>

<div class="container">
    <h1>☀️ Bazénový manažér 💧</h1>
    
    <div class="group">
        <label>Počasie dnes:</label>
        <select id="weather" onchange="calculatePool()">
            <option value="sunny">Slnečno / Horúco</option>
            <option value="cloudy">Zamračené / Chladno</option>
            <option value="rain">Hustý dážď / Búrka</option>
        </select>
    </div>

    <div class="group">
        <label>Vizuálny stav vody:</label>
        <select id="waterState" onchange="calculatePool()">
            <option value="clear">Číra a čistá</option>
            <option value="milky">Jemne mliečna (začiatok problému)</option>
            <option value="cloudy">Zahmlená / Sivá (mŕtve riasy/organika)</option>
            <option value="green">Zelená (riasy útočia naplno)</option>
        </select>
    </div>

    <div class="group">
        <label>Stav dna bazéna:</label>
        <select id="floorState" onchange="calculatePool()">
            <option value="clean">Čisté dno</option>
            <option value="slimy">Mazľavé / Klzké na dotyk</option>
            <option value="clumps">Sivé chumáče / Usadený kal</option>
        </select>
    </div>

    <div class="group">
        <label>Teplota vody: <span class="val-display" id="tempVal">24°C</span></label>
        <input type="range" id="temp" min="15" max="34" value="24" oninput="calculatePool()">
    </div>

    <div class="group">
        <label>Namerané pH vody: <span class="val-display" id="phVal">7.2</span></label>
        <input type="range" id="ph" min="6.5" max="8.2" step="0.1" value="7.2" oninput="calculatePool()">
    </div>

    <div class="group">
        <label>Koľko ľudí sa dnes kúpalo: <span class="val-display" id="peopleVal">0</span></label>
        <input type="range" id="people" min="0" max="6" value="0" oninput="calculatePool()">
    </div>

    <div class="group">
        <label>Ako dlho (v hodinách): <span class="val-display" id="durationVal">0h</span></label>
        <input type="range" id="duration" min="0" max="6" step="0.5" value="0" oninput="calculatePool()">
    </div>

    <div class="group">
        <label>Kedy si naposledy PREPRAL guličky:</label>
        <input type="date" id="peDate" onchange="calculatePool()">
    </div>

    <div class="group">
        <label>Kedy si vložil NOVÚ tabletu 5v1:</label>
        <input type="date" id="tabletDate" onchange="calculatePool()">
    </div>

    <div class="group" style="display:none;">
        <!-- Tieto staré slidery ostanú skryté na pozadí s predvolenou hodnotou, aby nerozbíjali dizajn, kód s nimi pracuje interne -->
        <input type="range" id="lastSwim" min="0" max="14" value="0">
        <input type="range" id="days" min="0" max="10" value="1">
    </div>

    <div id="results"></div>
</div>

<script>
// Nastav predvolený dnešný dátum do políčok pri prvom načítaní
const dnes = new Date().toISOString().split('T')[0];
document.getElementById('peDate').value = dnes;
document.getElementById('tabletDate').value = dnes;

function calculatePool() {
    const weather = document.getElementById('weather').value;
    const waterState = document.getElementById('waterState').value;
    const floorState = document.getElementById('floorState').value;
    const temp = parseInt(document.getElementById('temp').value);
    const ph = parseFloat(document.getElementById('ph').value);
    const people = parseInt(document.getElementById('people').value);
    const duration = parseFloat(document.getElementById('duration').value);
    
    // Výpočet dní od údržby z dátumovníka
    const dnesDate = new Date();
    const peDateVal = new Date(document.getElementById('peDate').value || dnes);
    const tabletDateVal = new Date(document.getElementById('tabletDate').value || dnes);
    
    const dniOdGuliciek = Math.max(0, Math.floor((dnesDate - peDateVal) / (1000 * 60 * 60 * 24)));
    const dniOdTablety = Math.max(0, Math.floor((dnesDate - tabletDateVal) / (1000 * 60 * 60 * 24)));

    // Displeje textu pre slidery
    document.getElementById('tempVal').innerText = temp + "°C";
    document.getElementById('phVal').innerText = ph;
    document.getElementById('peopleVal').innerText = people;
    document.getElementById('durationVal').innerText = duration + "h";

    const batherHours = people * duration;

    // 1. Logika filtrácie
    let filterHours = Math.max(2, Math.ceil(temp / 5)); 
    if (batherHours > 0) filterHours += Math.ceil(batherHours * 0.75);
    if (weather === 'rain') filterHours += 1;

    let isEmergency = false;
    if (waterState !== 'clear' || floorState !== 'clean') {
        isEmergency = true;
        if (waterState === 'milky' || floorState === 'slimy') filterHours = 8;
        if (waterState === 'cloudy' || floorState === 'clumps') filterHours = 12;
        if (waterState === 'green') filterHours = 24; 
    }

    let timing = "Cez deň (11:00 - 15:00). Solix beží priamo zo slnka, šetríš cykly baterky.";
    if (isEmergency) {
        timing = "🚨 NÚDZOVÝ REŽIM: Filtruj NONSTOP (aj v noci zo Solixu). Vypnúť len na pranie guličiek!";
    } else if (batherHours > 2) {
        timing = "Zapni manuálne na 2 hodiny IHNEĎ po kúpaní (zo Solixu), zvyšok odkrúť cez obed zo slnka.";
    }

    // 2. Fólia
    let cover = "Zakryť fóliou. Brániš odparovaniu vody a UV žiareniu, ktoré ti požiera chlór.";
    if (waterState === 'green') {
        cover = "ODKRYŤ! Riasy potrebujú tmu pod čiernou fóliou. Nechaj svietiť priame slnko (UV pomáha).";
    } else if (temp >= 28 && weather === 'sunny') {
        cover = "ODKRYŤ! Voda má nad 28°C. Pod čiernou fóliou vyrobíš skleník pre riasy.";
    }

    // 3. Logika pH chémie
    let chemInstructions = "pH je v norme (7.0 - 7.4). Chlór z tablety pracuje na 100%.";
    let showChemBox = false;

    if (ph > 7.4) {
        showChemBox = true;
        let diff = ((ph - 7.2) * 10).toFixed(0);
        let grams = diff * 30;
        chemInstructions = `<strong>pH je vysoké (${ph})!</strong> Chlór stráca účinnosť. <br>👉 Pridaj cca <strong>${grams}g pH MÍNUS</strong>. Rozpusť v kýbli a vlej za chodu filtrácie.`;
    } else if (ph < 7.0) {
        showChemBox = true;
        let diff = ((7.2 - ph) * 10).toFixed(0);
        let grams = diff * 30;
        chemInstructions = `<strong>pH je nízke (${ph})!</strong> Korozívna voda. <br>👉 Pridaj cca <strong>${grams}g pH PLUS</strong>. Rozpusť v kýbli a vlej za chodu filtrácie.`;
    }

    // 4. PREDIKTÍVNY MANAŽMENT TABLETY
    // Životnosť 20g tablety v 3m3 závisí od teploty vody. Base dni = 9 dní pri chladnej vode.
    let ocakavanaZivotnostTablety = 9;
    if (temp >= 24) ocakavanaZivotnostTablety = 6;
    if (temp >= 28) ocakavanaZivotnostTablety = 4;
    
    let zostavajuceDniTablety = ocakavanaZivotnostTablety - dniOdTablety;
    let floatStatus = "";
    
    if (zostavajuceDniTablety <= 0) {
        floatStatus = "<strong>🚨 TABLETA JE PRAVDEPODOBNE ROZPUSTENÁ!</strong> Podľa teploty vody už prešlo " + dniOdTablety + " dní. Skontroluj plavák a hoď tam novú 20g tabletu 5v1, inak risiskuješ zelenú vodu.";
    } else {
        floatStatus = `Tableta vložená pred <strong>${dniOdTablety} dňami</strong>. Odhadovaná spotreba: cca <strong>${Math.round((dniOdTablety/ocakavanaZivotnostTablety)*100)}%</strong> (Zostáva cca ${zostavajuceDniTablety} dní).<br>`;
        if (temp < 22) floatStatus += "<strong>Nastavenie plaváka: ŠKRTIŤ (1 dierka)</strong>.";
        else if (temp >= 22 && temp <= 26) floatStatus += "<strong>Nastavenie plaváka: ŠTANDARD (50%)</strong>.";
        else floatStatus += "<strong>Nastavenie plaváka: NAPLNO (100%)</strong>.";
    }

    // 5. PREDIKTÍVNY MANAŽMENT PE GULIČIEK
    // Guličky pri čistej prevádzke vydržia cca 14 dní. Ak je voda zlá alebo batherHours vysoké, klesá to.
    let maxDniGuliciek = 14;
    if (waterState !== 'clear' || floorState !== 'clean') maxDniGuliciek = 3; // Kríza skracuje čas drasticky
    if (temp > 26) maxDniGuliciek = Math.min(maxDniGuliciek, 8);

    let zostavaDniGulicky = maxDniGuliciek - dniOdGuliciek;
    let peStatus = "";

    if (zostavaDniGulicky <= 0 || floorState === 'clumps') {
        peStatus = "🚨 <strong>JE ČAS PREPRAŤ PE GULIČKY!</strong> Sú v bazéne už " + dniOdGuliciek + " dní " + (floorState==='clumps' ? 'a nasali vysatý kal':'') + ". Preper ich pod tečúcou vodou, nech obnovíš plný prietok a odľahčíš čerpadlo.";
    } else {
        peStatus = `Guličky sú čisté (vložené pred ${dniOdGuliciek} dňami). Ďalšie pranie nutné o cca <strong>${zostavaDniGulicky} dní</strong> (ak ostane čistá voda).`;
    }

    // 6. Výstrahy na mieru
    let alerts = [];
    if (isEmergency) alerts.push("⚠️ <strong>Kríza:</strong> Guličky preper hneď po vyčistení mlieka/riasy, zachytia obrovské množstvo mŕtveho kalu.");
    if (dniOdTablety > 7 && zostavajuceDniTablety > 0) alerts.push("🔍 Tableta síce podľa výpočtu ešte žije, ale radšej vizuálne mrkni do plaváka, či z nej neostal len malý kúsok.");

    let alertHtml = '';
    if (alerts.length > 0) {
        alertHtml = `<div class="result-box warning"><div class="info-title">⚠️ DÔLEŽITÉ UPOZORNENIA:</div><ul style="margin:5px 0; padding-left:20px;">${alerts.map(a => `<li>${a}</li>`).join('')}</ul></div>`;
    }

    let chemHtml = '';
    if (showChemBox) {
        chemHtml = `<div class="result-box chem-action"><div class="info-title">🧪 ÚPRAVA pH (pre objem 3m³):</div>${chemInstructions}</div>`;
    } else {
        chemHtml = `<div class="result-box" style="background:#f0fdf4; border-left-color:#22c55e;"><div class="info-title">🧪 STAV pH:</div>${chemInstructions}</div>`;
    }

    document.getElementById('results').innerHTML = `
        <div class="result-box" style="${isEmergency ? 'background:#fff5f5; border-left-color:#e53e3e;' : ''}">
            <div class="info-title">💧 CHOD FILTRÁCIE:</div>
            Doba: <strong>${filterHours} hod</strong><br>
            Kedy: <em>${timing}</em>
        </div>
        <div class="result-box" style="background:#e8f0fe; border-left-color:#1a73e8;">
            <div class="info-title">🖤 KRYCIA FÓLIA:</div>
            ${cover}
        </div>
        <div class="result-box float-box">
            <div class="info-title">🛟 STAV TABLETY 5v1 (Odhad rozpúšťania):</div>
            ${floatStatus}
        </div>
        <div class="result-box" style="background:#faf5ff; border-left-color:#a855f7; color:#581c87;">
            <div class="info-title">🪶 STAV PE GULIČIEK (Zanesenie filtra):</div>
            ${peStatus}
        </div>
        ${chemHtml}
        ${alertHtml}
    `;
}
</script>
</body>
</html>
