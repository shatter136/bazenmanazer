<!DOCTYPE html>
<html lang="sk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Solar Pool Assistant PRO</title>
    <style>
        :root { --bg: #f4f7f6; --card: #ffffff; --primary: #0056b3; --text: #2c3e50; }
        body { font-family: system-ui, -apple-system, sans-serif; background: var(--bg); color: var(--text); padding: 15px; margin: 0; display: flex; justify-content: center; }
        .container { max-width: 480px; width: 100%; background: var(--card); padding: 20px; border-radius: 16px; box-shadow: 0 8px 24px rgba(0,0,0,0.08); }
        h1 { font-size: 1.3rem; text-align: center; color: var(--primary); margin-top: 0; border-bottom: 2px solid #eef2f5; padding-bottom: 10px; }
        .group { margin-bottom: 15px; background: #f8fafc; padding: 10px; border-radius: 8px; border: 1px solid #edf2f7; }
        label { display: flex; justify-content: space-between; font-weight: bold; margin-bottom: 5px; font-size: 0.85rem; text-transform: uppercase; letter-spacing: 0.5px; }
        .val-display { color: var(--primary); font-weight: bold; }
        select, input[type="number"], input[type="range"] { width: 100%; padding: 8px; border: 1px solid #cbd5e1; border-radius: 6px; box-sizing: border-box; font-size: 1rem; }
        .result-box { background: #f0fdf4; border-left: 5px solid #22c55e; padding: 12px; border-radius: 8px; margin-top: 15px; font-size: 0.95rem; }
        .warning { background: #fef2f2; border-left: 5px solid #ef4444; color: #991b1b; }
        .info-title { font-weight: bold; margin-bottom: 4px; font-size: 0.85rem; color: #1e293b; }
    </style>
</head>
<body>

<div class="container">
    <h1>☀️ Solar Pool Assistant PRO v2.0</h1>
    
    <div class="group">
        <label>Počasie dnes:</label>
        <select id="weather" onchange="calculatePool()">
            <option value="sunny">Slnečno / Horúco</option>
            <option value="cloudy">Zamračené / Chladno</option>
            <option value="rain">Hustý dážď / Búrka</option>
        </select>
    </div>

    <div class="group">
        <label>Teplota vody: <span class="val-display" id="tempVal">24°C</span></label>
        <input type="range" id="temp" min="15" max="34" value="24" oninput="calculatePool()">
    </div>

    <div class="group">
        <label>Koľko ľudí sa dnes kúpalo: <span class="val-display" id="peopleVal">0</span></label>
        <input type="range" id="people" min="0" max="6" value="0" oninput="calculatePool()">
    </div>

    <div class="group">
        <label>Ako dlho (v hodinách): <span class="val-display" id="durationVal">0h</span></label>
        <input type="range" id="duration" min="0" max="6" step="0.5" value="0" oninput="calculatePool()">
    </div>

    <div class="group">
        <label>Dni od posledného kúpania: <span class="val-display" id="lastSwimVal">0 dní</span></label>
        <input type="range" id="lastSwim" min="0" max="14" value="0" oninput="calculatePool()">
    </div>

    <div class="group">
        <label>Dni od merania pH / Cl: <span class="val-display" id="daysVal">2 dni</span></label>
        <input type="range" id="days" min="0" max="10" value="2" oninput="calculatePool()">
    </div>

    <div id="results"></div>
</div>

<script>
function calculatePool() {
    const weather = document.getElementById('weather').value;
    const temp = parseInt(document.getElementById('temp').value);
    const people = parseInt(document.getElementById('people').value);
    const duration = parseFloat(document.getElementById('duration').value);
    const lastSwim = parseInt(document.getElementById('lastSwim').value);
    const days = parseInt(document.getElementById('days').value);

    // Update text displejov
    document.getElementById('tempVal').innerText = temp + "°C";
    document.getElementById('peopleVal').innerText = people;
    document.getElementById('durationVal').innerText = duration + "h";
    document.getElementById('lastSwimVal').innerText = lastSwim + (lastSwim === 1 ? " deň" : (lastSwim < 5 && lastSwim > 0 ? " dni" : " dní"));
    document.getElementById('daysVal').innerText = days + (days === 1 ? " deň" : (days < 5 && days > 0 ? " dni" : " dní"));

    // Inžinierska kalkulácia záťaže (Človeko-hodiny)
    const batherHours = people * duration;

    // Základný čas filtrácie podla teploty vody (sedliacky model: teplota / 4)
    let filterHours = Math.max(2, Math.ceil(temp / 4));
    
    // Prirážka za kúpajúcich sa (každá človeko-hodina v malom bazéne priráta cca 45 minút filtrácie)
    if (batherHours > 0) {
        filterHours += Math.ceil(batherHours * 0.75);
    }

    // Prirážka za stojatú vodu (ak sa týždeň nikto nekúpal, treba prehnať objem aspoň 2x)
    if (lastSwim >= 5 && batherHours === 0) {
        filterHours = Math.max(filterHours, 4); 
    }

    if (weather === 'rain') filterHours += 1;
    if (filterHours > 10) filterHours = 10; // Max strop pre C530 pumpu

    // Rozhodovanie o fólii
    let cover = "Zakryť čiernou fóliou. Držíš teplo a chrániš chlór pred UV žiarením.";
    if (temp >= 28 && weather === 'sunny') {
        cover = "ODKRYŤ! Voda má nad 28°C. Pod čiernou fóliou vyrobíš skleník pre riasy.";
    } else if (batherHours > 0) {
        cover = "Odkryté počas kúpania. Po skončení okamžite zakryť, nech Solix nefiltruje do prázdna (odparovanie vody).";
    }

    // Solix Power Management & Načasovanie
    let timing = "Cez deň (11:00 - 15:00). Solix ide priamo zo 100W panela, šetríš cykly baterky.";
    if (batherHours > 2) {
        timing = "Hneď po kúpaní zapni manuálne na 2 hodiny (zo Solix baterky), zvyšok nechaj na slnečné hodiny.";
    } else if (weather === 'rain') {
        timing = "Počkaj, kým prejde najväčší dno-cuc, a filtruj až PO búrke.";
    }

    // Výstrahy na mieru
    let alerts = [];
    if (days >= 4) alerts.push("⚠️ Zmeraj pH a Cl! Už " + days + " dní si to nemeral. Malý bazén padne do kysla bleskovo.");
    if (temp > 26) alerts.push("🔥 Voda má nad 26°C. Tableta 5v1 sa rýchlejšie roztápa, skontroluj plavák.");
    if (batherHours >= 4) alerts.push("🧼 Vysoká záťaž vody! PE guličky dostali zabrať, ak zajtra klesne prietok vody, preper ich v čistej vode.");
    if (lastSwim >= 7 && batherHours > 0) alerts.push("🔄 Prvé kúpanie po dlhej dobe. Skontroluj dno, či tam nesedí usadený kal, než ho nohami rozvírite.");
    if (weather === 'rain') alerts.push("⛈️ Búrka spláchla prach a dusík do vody. Dnes večer preventívne šupni trochu chlóru naviac.");

    let alertHtml = '';
    if (alerts.length > 0) {
        alertHtml = `<div class="result-box warning"><div class="info-title">⚠️ UPOZORNENIA PRO:</div><ul style="margin:5px 0; padding-left:20px;">${alerts.map(a => `<li>${a}</li>`).join('')}</ul></div>`;
    }

    document.getElementById('results').innerHTML = `
        <div class="result-box">
            <div class="info-title">💧 CHOD FILTRÁCIE:</div>
            Doba: <strong>${filterHours} hod ${filterHours > 4 ? '(zvýšená záťaž)' : ''}</strong><br>
            Kedy: <em>${timing}</em>
        </div>
        <div class="result-box" style="background:#e8f0fe; border-left-color:#1a73e8;">
            <div class="info-title">🖤 ČIERNA BUBLE FÓLIA:</div>
            ${cover}
        </div>
        ${alertHtml}
    `;
}

// Inicializácia
calculatePool();
</script>
</body>
</html>
