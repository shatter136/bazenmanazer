<!DOCTYPE html>
<html lang="sk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bazénový Manažér</title>
    <style>
        :root { --bg: #f4f7f6; --card: #ffffff; --primary: #0056b3; --text: #2c3e50; }
        body { font-family: system-ui, -apple-system, sans-serif; background: var(--bg); color: var(--text); padding: 15px; margin: 0; display: flex; justify-content: center; }
        .container { max-width: 480px; width: 100%; background: var(--card); padding: 20px; border-radius: 16px; box-shadow: 0 8px 24px rgba(0,0,0,0.08); }
        h1 { font-size: 1.3rem; text-align: center; color: var(--primary); margin-top: 0; border-bottom: 2px solid #eef2f5; padding-bottom: 10px; }
        .group { margin-bottom: 12px; background: #f8fafc; padding: 10px; border-radius: 8px; border: 1px solid #edf2f7; }
        label { display: flex; justify-content: space-between; font-weight: bold; margin-bottom: 5px; font-size: 0.85rem; text-transform: uppercase; letter-spacing: 0.5px; }
        .val-display { color: var(--primary); font-weight: bold; }
        select, input[type="number"], input[type="range"] { width: 100%; padding: 8px; border: 1px solid #cbd5e1; border-radius: 6px; box-sizing: border-box; font-size: 1rem; }
        .result-box { background: #f0fdf4; border-left: 5px solid #22c55e; padding: 12px; border-radius: 8px; margin-top: 12px; font-size: 0.95rem; }
        .warning { background: #fef2f2; border-left: 5px solid #ef4444; color: #991b1b; }
        .chem-action { background: #fffbeb; border-left: 5px solid #f59e0b; color: #78350f; }
        .float-box { background: #f0f9ff; border-left: 5px solid #0284c7; color: #0c4a6e; }
        .info-title { font-weight: bold; margin-bottom: 4px; font-size: 0.85rem; color: #1e293b; }
    </style>
</head>
<body>

<div class="container">
    <h1>☀️ Bazénový Manažér</h1>
    
    <div class="group">
        <label>Počasie dnes:</label>
        <select id="weather" onchange="calculatePool()">
            <option value="sunny">Slnečno / Horúco</option>
            <option value="cloudy">Zamračené / Chladno</option>
            <option value="rain">Hustý dážď / Búrka</option>
        </select>
    </div>

    <div class="group">
        <label>Teplota vody: <span class="val-display" id="tempVal">24°C</span></label>
        <input type="range" id="temp" min="15" max="34" value="24" oninput="calculatePool()">
    </div>

    <div class="group">
        <label>Namerané pH vody: <span class="val-display" id="phVal">7.2</span></label>
        <input type="range" id="ph" min="6.5" max="8.2" step="0.1" value="7.2" oninput="calculatePool()">
    </div>

    <div class="group">
        <label>Koľko ľudí sa dnes kúpalo: <span class="val-display" id="peopleVal">0</span></label>
        <input type="range" id="people" min="0" max="6" value="0" oninput="calculatePool()">
    </div>

    <div class="group">
        <label>Ako dlho (v hodinách): <span class="val-display" id="durationVal">0h</span></label>
        <input type="range" id="duration" min="0" max="6" step="0.5" value="0" oninput="calculatePool()">
    </div>

    <div class="group">
        <label>Dni od posledného kúpania: <span class="val-display" id="lastSwimVal">0 dní</span></label>
        <input type="range" id="lastSwim" min="0" max="14" value="0" oninput="calculatePool()">
    </div>

    <div class="group">
        <label>Dni od merania chémie: <span class="val-display" id="daysVal">2 dni</span></label>
        <input type="range" id="days" min="0" max="10" value="2" oninput="calculatePool()">
    </div>

    <div id="results"></div>
</div>

<script>
function calculatePool() {
    const weather = document.getElementById('weather').value;
    const temp = parseInt(document.getElementById('temp').value);
    const ph = parseFloat(document.getElementById('ph').value);
    const people = parseInt(document.getElementById('people').value);
    const duration = parseFloat(document.getElementById('duration').value);
    const lastSwim = parseInt(document.getElementById('lastSwim').value);
    const days = parseInt(document.getElementById('days').value);

    // Displeje textu
    document.getElementById('tempVal').innerText = temp + "°C";
    document.getElementById('phVal').innerText = ph;
    document.getElementById('peopleVal').innerText = people;
    document.getElementById('durationVal').innerText = duration + "h";
    document.getElementById('lastSwimVal').innerText = lastSwim + (lastSwim === 1 ? " deň" : (lastSwim < 5 && lastSwim > 0 ? " dni" : " dní"));
    document.getElementById('daysVal').innerText = days + (days === 1 ? " deň" : (days < 5 && days > 0 ? " dni" : " dní"));

    const batherHours = people * duration;

    // 1. Filtrácia
    let filterHours = Math.max(2, Math.ceil(temp / 4));
    if (batherHours > 0) filterHours += Math.ceil(batherHours * 0.75);
    if (lastSwim >= 5 && batherHours === 0) filterHours = Math.max(filterHours, 4); 
    if (weather === 'rain') filterHours += 1;
    if (filterHours > 10) filterHours = 10;

    let timing = "Cez deň (11:00 - 15:00). Solix beží priamo zo slnka, šetríš cykly baterky.";
    if (batherHours > 2) {
        timing = "Zapni manuálne na 2 hodiny IHNEĎ po kúpaní (zo Solixu), zvyšok odkrúť cez obed zo slnka.";
    } else if (weather === 'rain') {
        timing = "Počkaj na koniec búrky. Filtrúť až potom, nech PE guličky chytia spláchnutý prach.";
    }

    // 2. Fólia
    let cover = "Zakryť fóliou. Brániš odparovaniu vody a UV žiareniu, ktoré ti požiera chlór.";
    if (temp >= 28 && weather === 'sunny') {
        cover = "ODKRYŤ! Voda má nad 28°C. Pod čiernou fóliou vyrobíš ideálny inkubátor pre riasy.";
    }

    // 3. Logika pH chémie
    let chemInstructions = "pH je v ideálnej inžinierskej norme (7.0 - 7.4). Chlór z tablety pracuje na 100%.";
    let showChemBox = false;

    if (ph > 7.4) {
        showChemBox = true;
        let diff = ((ph - 7.2) * 10).toFixed(0);
        let grams = diff * 30;
        chemInstructions = `<strong>pH je vysoké (${ph})!</strong> Chlór stráca účinnosť. <br>👉 Pridaj cca <strong>${grams}g pH MÍNUS</strong>. Rozpusť ho v kýbli s vodou a vlej pred výtlak filtrácie pri zapnutom chode.`;
    } else if (ph < 7.0) {
        showChemBox = true;
        let diff = ((7.2 - ph) * 10).toFixed(0);
        let grams = diff * 30;
        chemInstructions = `<strong>pH je nízke (${ph})!</strong> Korozívna voda, riskuješ podráždenie očí. <br>👉 Pridaj cca <strong>${grams}g pH PLUS</strong>. Rozpusť v kýbli a vlej do bazéna za chodu filtrácie.`;
    }

    // 4. Riadenie plaváka & 20g tablety 5v1
    let floatStatus = "";
    if (batherHours > 0) {
        floatStatus = "<strong>POČAS KÚPANIA PLAVÁK VYBERTE!</strong> Hoď ho do kýbľa s bazénovou vodou vedľa bazéna. Bezpečnosť nadovšetko, koncentrovaný chlór nemá ísť priamo na kožu kúpajúcich sa. Po kúpaní vrátiť späť.";
    } else {
        if (temp < 22) {
            floatStatus = "<strong>Nastavenie: ŠKRTIŤ (Otvorený na cca 25% / 1 malá dierka)</strong>.<br>Voda je chladná, chlór sa odparuje pomaly. Stačí minimálne uvoľňovanie, aby si neprechlóroval 3m³.";
        } else if (temp >= 22 && temp <= 26) {
            floatStatus = "<strong>Nastavenie: ŠTANDARD (Otvorený na cca 50% / polovičné štrbiny)</strong>.<br>Ideálny stav pre udržanie stabilnej hladiny chlóru pri bežných teplotách.";
        } else {
            floatStatus = "<strong>Nastavenie: NAPLNO (Otvoriť otvory na 100%)</strong>.<br>Voda má nad 26°C, riasy útočia. Tableta v plaváku musí makať na plný výkon, aby stíhala vodu dezinfikovať.";
        }
    }

    // Potreba tablety v bazéne (vysvetlenie kedy áno/nie)
    let tabletaPotreba = "<br><small>💡 <em>Význam tablety:</em> 5v1 ti dodáva permanentný chlór, stabilizátor chlóru, vločkovač proti zakaleniu, riasobijec a stabilizátor pH. Keďže si robil chlór shock, tableta teraz slúži ako 'strážny pes', aby hladina chlóru neklesla pod 0.3 mg/l.</small>";
    floatStatus += tabletaPotreba;

    // 5. Výstrahy na mieru
    let alerts = [];
    if (days >= 4) alerts.push("⚠️ Nemeral si chémiu už " + days + " dní. Na 3m³ stačí jedna búrka a voda ujde.");
    if (temp > 26) alerts.push("🔥 Voda má nad 26°C. Sleduj plavák, tableta 5v1 mizne rýchlejšie.");
    if (batherHours >= 4) alerts.push("🧼 Dnes vysoká organická záťaž. PE guličky dostali zabrať, ráno skontroluj prietok.");
    if (weather === 'rain') alerts.push("⛈️ Kyslý dážď spravidla zráža alkalinitu a prináša spóry. Po búrke prekontroluj pH znova.");

    let alertHtml = '';
    if (alerts.length > 0) {
        alertHtml = `<div class="result-box warning"><div class="info-title">⚠️ UPOZORNENIA:</div><ul style="margin:5px 0; padding-left:20px;">${alerts.map(a => `<li>${a}</li>`).join('')}</ul></div>`;
    }

    let chemHtml = '';
    if (showChemBox) {
        chemHtml = `<div class="result-box chem-action"><div class="info-title">🧪 ÚPRAVA pH (pre objem 3m³):</div>${chemInstructions}</div>`;
    } else {
        chemHtml = `<div class="result-box" style="background:#f0fdf4; border-left-color:#22c55e;"><div class="info-title">🧪 STAV pH:</div>${chemInstructions}</div>`;
    }

    document.getElementById('results').innerHTML = `
        <div class="result-box">
            <div class="info-title">💧 CHOD FILTRÁCIE:</div>
            Doba: <strong>${filterHours} hod</strong><br>
            Kedy: <em>${timing}</em>
        </div>
        <div class="result-box" style="background:#e8f0fe; border-left-color:#1a73e8;">
            <div class="info-title">🖤 KRYCIA FÓLIA:</div>
            ${cover}
        </div>
        <div class="result-box float-box">
            <div class="info-title">🛟 MANAŽMENT PLAVÁKA (20g TABLETA):</div>
            ${floatStatus}
        </div>
        ${chemHtml}
        ${alertHtml}
    `;
}

calculatePool();
</script>
</body>
</html>
