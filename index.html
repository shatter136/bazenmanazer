<!DOCTYPE html>
<html lang="sk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Solar Pool Assistant v1.0</title>
    <style>
        :root { --bg: #f0f4f8; --card: #ffffff; --primary: #0070f3; --text: #333; }
        body { font-family: system-ui, -apple-system, sans-serif; background: var(--bg); color: var(--text); padding: 20px; margin: 0; display: flex; justify-content: center; }
        .container { max-width: 500px; width: 100%; background: var(--card); padding: 20px; border-radius: 12px; box-shadow: 0 4px 10px rgba(0,0,0,0.05); }
        h1 { font-size: 1.4rem; text-align: center; color: var(--primary); margin-top: 0; }
        .group { margin-bottom: 15px; }
        label { display: block; font-weight: bold; margin-bottom: 5px; font-size: 0.9rem; }
        select, input { width: 100%; padding: 10px; border: 1px solid #ccc; border-radius: 6px; box-sizing: border-box; font-size: 1rem; }
        .result-box { background: #e6f4ea; border-left: 5px solid #34a853; padding: 15px; border-radius: 6px; margin-top: 20px; }
        .warning { background: #fce8e6; border-left: 5px solid #ea4335; color: #c5221f; }
        .info-title { font-weight: bold; margin-bottom: 5px; text-transform: uppercase; font-size: 0.85rem; }
    </style>
</head>
<body>

<div class="container">
    <h1>☀️ Solar Pool Assistant (3m³)</h1>
    
    <div class="group">
        <label>Počasie:</label>
        <select id="weather" onchange="calculatePool()">
            <option value="sunny">Slnečno / Horúčava</option>
            <option value="cloudy">Zamračené / Chladno</option>
            <option value="rain">Hustý dážď / Búrka</option>
        </select>
    </div>

    <div class="group">
        <label>Teplota vody (°C):</label>
        <input type="number" id="temp" value="24" min="15" max="35" onchange="calculatePool()" oninput="calculatePool()">
    </div>

    <div class="group">
        <label>Kúpanie & Záťaž:</label>
        <select id="load" onchange="calculatePool()">
            <option value="none">Nikto (len údržba)</option>
            <option value="normal">1-2 ľudia (čistí)</option>
            <option value="heavy">Deti / Párty / Celý deň</option>
        </select>
    </div>

    <div class="group">
        <label>Dni od posledného merania pH / Cl:</label>
        <input type="number" id="days" value="2" min="0" max="14" onchange="calculatePool()" oninput="calculatePool()">
    </div>

    <div id="results"></div>
</div>

<script>
function calculatePool() {
    const weather = document.getElementById('weather').value;
    const temp = parseFloat(document.getElementById('temp').value) || 24;
    const load = document.getElementById('load').value;
    const days = parseInt(document.getElementById('days').value) || 0;

    let filterHours = 3; 
    let timing = "Cez deň (11:00 - 15:00) – páľ čisté slnko rovno z panela.";
    let cover = "Zakryť fóliou (akumulácia tepla, stop odparovaniu).";
    let alerts = [];

    // Algoritmus hodín filtrácie podľa teploty (sedliacky rozum: teplota/2)
    filterHours = Math.max(2, Math.ceil(temp / 4));
    if (load === 'normal') filterHours += 1;
    if (load === 'heavy') filterHours += 3;
    if (weather === 'rain') filterHours += 1;

    // Limit filtrácie pre tvoje čerpadlo (max 8h na taký malý bazén stačí bohato)
    if (filterHours > 8) filterHours = 8;

    // Logika zakrývania
    if (temp >= 28 && weather === 'sunny') {
        cover = "ODKRYŤ! Voda je moc teplá. Ak ju necháš pod čiernou fóliou, uvaríš riasy.";
    } else if (weather === 'rain') {
        cover = "Zakryť! Nech ti kyslý dážď a bordel nerozhádžu pH.";
    }

    // Solix manažment časovania
    if (load === 'heavy') {
        timing = "Pustit IHNEĎ po kúpaní na 2 hodiny (zo Solix baterky), zvyšok cez deň zo slnka.";
    } else if (weather === 'rain') {
        timing = "Filtruj až PO búrke, nech PE guličky stiahnu spláchnutý bordel.";
    }

    // Výstrahy
    if (days >= 4) alerts.push("Zmeraj pH a Chlór! Už to flákaš " + days + " dni. Pri týchto teplotách to vie streliť za pár hodín.");
    if (temp > 26) alerts.push("Voda má nad 26°C. Riasy začínajú mať orgie. Skontroluj, či plavák s 5v1 tabletou nie je prázdny.");
    if (weather === 'rain') alerts.push("Po búrke šupni preventívne deci chlóru (alebo Cl šok), dážď prináša spóry rias.");
    if (load === 'heavy') alerts.push("Po detskej párty preper PE guličky. Budú chytené od opaľovacích krémov.");

    let alertHtml = '';
    if (alerts.length > 0) {
        alertHtml = `<div class="result-box warning"><div class="info-title">⚠️ POZOR / ÚDRŽBA:</div><ul>${alerts.map(a => `<li>${a}</li>`).join('')}</ul></div>`;
    }

    document.getElementById('results').innerHTML = `
        <div class="result-box">
            <div class="info-title">💧 FILTRÁCIA:</div>
            Doba: <strong>${filterHours} hodiny</strong><br>
            Kedy: ${timing}
        </div>
        <div class="result-box" style="background:#e8f0fe; border-left-color:#1a73e8;">
            <div class="info-title">🖤 KRYCIA FÓLIA:</div>
            ${cover}
        </div>
        ${alertHtml}
    `;
}
// Spusti hneď pri načítaní
calculatePool();
</script>
</body>
</html>
